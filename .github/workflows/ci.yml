name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    tags: ["v*"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting (gofumpt)
        run: |
          files=$(gofumpt -l .)
          if [ -n "$files" ]; then
            echo "These files are not gofumpt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Docs consistency
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f docs/ARCHITECTURE.md
          test -f docs/COMMANDS.md
          test -f docs/RELEASE.md
          grep -q "docs/ARCHITECTURE.md" README.md
          grep -q "docs/COMMANDS.md" README.md
          grep -q "docs/RELEASE.md" README.md
          grep -q "CHANGELOG.md" README.md
          if rg -n "internal/tui/layout|internal/fileutil|internal/restoreexec|internal/deleteexec|session/scanner_head.go|session/migrate.go" docs README.md; then
            echo "docs still reference removed/legacy paths"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOEXPERIMENT: jsonv2
      UNIT_COVERAGE_MIN: "60"
      INTEGRATION_COVERAGE_MIN: "72"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test (unit)
        run: go test -count=1 ./... -coverprofile=coverage_unit.out

      - name: Test (integration)
        run: go test -count=1 -tags=integration ./cli/... -coverprofile=coverage_integration.out

      - name: Coverage gate
        run: |
          unit_cov=$(go tool cover -func=coverage_unit.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          integration_cov=$(go tool cover -func=coverage_integration.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          awk -v got="$unit_cov" -v min="$UNIT_COVERAGE_MIN" 'BEGIN { if (got+0 < min+0) { printf("unit coverage %.1f%% < %.1f%%\n", got, min); exit 1 } else { printf("unit coverage %.1f%% >= %.1f%%\n", got, min) } }'
          awk -v got="$integration_cov" -v min="$INTEGRATION_COVERAGE_MIN" 'BEGIN { if (got+0 < min+0) { printf("integration coverage %.1f%% < %.1f%%\n", got, min); exit 1 } else { printf("integration coverage %.1f%% >= %.1f%%\n", got, min) } }'

      - name: Build
        run: go build -ldflags="-X main.version=ci-${{ github.sha }}" -o codexsm .

  smoke:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Smoke checks
        run: just ci-smoke

  bench:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOEXPERIMENT: jsonv2
      BENCH_SORT_3K_NS_MAX: "15000000"
      BENCH_SORT_10K_NS_MAX: "50000000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Session benchmarks
        run: just bench-session

      - name: CLI benchmarks
        run: just bench-cli

      - name: TUI benchmark gate
        run: just bench-gate

      - name: TUI benchmark sweep
        run: just bench-tui
